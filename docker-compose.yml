services:
  postgres:
    image: postgres:16-alpine
    container_name: omniblitz-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: omniblitz
      POSTGRES_PASSWORD: omniblitz_dev
      POSTGRES_DB: omniblitz
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
